<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Responsive Image Gallery</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f5f5f5;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
    color:#333;
}

/* Filter Buttons */
.filters{
    display:flex;
    justify-content:center;
    gap:10px;
    margin-bottom:25px;
    flex-wrap:wrap;
}

.filters button{
    padding:10px 20px;
    border:none;
    cursor:pointer;
    background:#ddd;
    border-radius:5px;
    font-size:16px;
    transition:0.3s;
}

.filters button:hover,
.filters button.active{
    background:#333;
    color:white;
}

/* Gallery Layout */
.gallery{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}

.gallery-item{
    overflow:hidden;
    border-radius:10px;
    box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.gallery-item img{
    width:100%;
    height:250px;
    object-fit:cover;
    cursor:pointer;
    transition:transform .4s ease, filter .4s ease;
}

/* Hover Effects */
.gallery-item:hover img{
    transform:scale(1.08);
    filter:brightness(80%);
}

/* Lightbox */
.lightbox{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,0.9);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:1000;
}

.lightbox.active{
    display:flex;
}

.lightbox-img{
    max-width:85%;
    max-height:80vh;
    border-radius:10px;
    animation:fade .4s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:scale(.9);
    }
    to{
        opacity:1;
        transform:scale(1);
    }
}

.close{
    position:absolute;
    top:20px;
    right:30px;
    color:white;
    font-size:40px;
    cursor:pointer;
}

/* Navigation Buttons */
.prev,
.next{
    position:absolute;
    top:50%;
    transform:translateY(-50%);
    font-size:30px;
    border:none;
    background:rgba(255,255,255,0.2);
    color:white;
    padding:10px 15px;
    cursor:pointer;
    border-radius:50%;
    transition:0.3s;
}

.prev:hover,
.next:hover{
    background:rgba(255,255,255,0.5);
}

.prev{
    left:20px;
}

.next{
    right:20px;
}

/* Responsive */
@media(max-width:768px){

    .gallery{
        grid-template-columns:1fr;
    }

    .lightbox-img{
        max-width:95%;
    }

    .prev,
    .next{
        font-size:24px;
        padding:8px 12px;
    }
}
</style>
</head>

<body>

<h1>Responsive Image Gallery</h1>

<!-- Filter Buttons -->
<div class="filters">
    <button class="active" data-filter="all">All</button>
    <button data-filter="nature">Nature</button>
    <button data-filter="city">City</button>
    <button data-filter="animals">Animals</button>
</div>

<!-- Gallery -->
<div class="gallery">

    <div class="gallery-item nature">
        <img src="https://tse4.mm.bing.net/th/id/OIP.XV7CefygWm6V-Gl3RBzNWgHaEo?pid=Api&h=220&P=0" alt="Nature">
    </div>

    <div class="gallery-item city">
        <img src="https://picsum.photos/id/1011/600/400" alt="City">
    </div>

    <div class="gallery-item animals">
        <img src="https://picsum.photos/id/1025/600/400" alt="Animal">
    </div>

    <div class="gallery-item nature">
        <img src="https://tse2.mm.bing.net/th/id/OIP.yh0RVltYbXatXg7z8RoPsAHaE7?pid=Api&h=220&P=0" alt="Nature">
    </div>

    <div class="gallery-item city">
        <img src="https://picsum.photos/id/1043/600/400" alt="City">
    </div>

    <div class="gallery-item animals">
        <img src="https://picsum.photos/id/237/600/400" alt="Animal">
    </div>

</div>

<!-- Lightbox -->
<div class="lightbox">
    <span class="close">&times;</span>

    <button class="prev">&#10094;</button>

    <img class="lightbox-img" src="" alt="">

    <button class="next">&#10095;</button>
</div>

<script>
// Gallery Images
const galleryImages = document.querySelectorAll(".gallery-item img");
const lightbox = document.querySelector(".lightbox");
const lightboxImg = document.querySelector(".lightbox-img");

const closeBtn = document.querySelector(".close");
const nextBtn = document.querySelector(".next");
const prevBtn = document.querySelector(".prev");

let currentIndex = 0;

// Open Lightbox
galleryImages.forEach((img, index) => {
    img.addEventListener("click", () => {
        currentIndex = index;
        showImage();
        lightbox.classList.add("active");
    });
});

// Show Image
function showImage(){
    lightboxImg.src = galleryImages[currentIndex].src;
}

// Next Image
nextBtn.addEventListener("click", () => {
    currentIndex = (currentIndex + 1) % galleryImages.length;
    showImage();
});

// Previous Image
prevBtn.addEventListener("click", () => {
    currentIndex =
    (currentIndex - 1 + galleryImages.length) %
    galleryImages.length;

    showImage();
});

// Close Lightbox
closeBtn.addEventListener("click", () => {
    lightbox.classList.remove("active");
});

// Close on Outside Click
lightbox.addEventListener("click", (e) => {
    if(e.target === lightbox){
        lightbox.classList.remove("active");
    }
});

// Keyboard Navigation
document.addEventListener("keydown", (e) => {

    if(!lightbox.classList.contains("active"))
        return;

    if(e.key === "ArrowRight"){
        nextBtn.click();
    }

    if(e.key === "ArrowLeft"){
        prevBtn.click();
    }

    if(e.key === "Escape"){
        lightbox.classList.remove("active");
    }
});

// Category Filter
const filterButtons =
document.querySelectorAll(".filters button");

const galleryItems =
document.querySelectorAll(".gallery-item");

filterButtons.forEach(button => {

    button.addEventListener("click", () => {

        filterButtons.forEach(btn =>
            btn.classList.remove("active")
        );

        button.classList.add("active");

        const filter = button.dataset.filter;

        galleryItems.forEach(item => {

            if(
                filter === "all" ||
                item.classList.contains(filter)
            ){
                item.style.display = "block";
            }
            else{
                item.style.display = "none";
            }
        });
    });
});
</script>

</body>
</html>
