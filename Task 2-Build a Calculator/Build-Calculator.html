<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#08090b,#60417a);
}

.calculator{
    background:#222;
    padding:20px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,0.4);
    width:320px;
}

#display{
    width:100%;
    height:70px;
    border:none;
    outline:none;
    text-align:right;
    font-size:2rem;
    padding:10px;
    border-radius:10px;
    margin-bottom:15px;
    background:#e4d8d8;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:10px;
    font-size:1.3rem;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.05);
}

.number{
    background:#444;
    color:white;
}

.operator{
    background:#ff9500;
    color:white;
}

.clear{
    background:#e74c3c;
    color:white;
}

.equal{
    background:#27ae60;
    color:white;
}

.zero{
    grid-column:span 2;
}
</style>
</head>
<body>

<div class="calculator">

    <input type="text" id="display" readonly>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('/')">÷</button>
        <button class="operator" onclick="appendValue('*')">×</button>
        <button class="operator" onclick="appendValue('-')">−</button>

        <button class="number" onclick="appendValue('7')">7</button>
        <button class="number" onclick="appendValue('8')">8</button>
        <button class="number" onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button class="number" onclick="appendValue('4')">4</button>
        <button class="number" onclick="appendValue('5')">5</button>
        <button class="number" onclick="appendValue('6')">6</button>
        <button class="equal" onclick="calculate()">=</button>

        <button class="number" onclick="appendValue('1')">1</button>
        <button class="number" onclick="appendValue('2')">2</button>
        <button class="number" onclick="appendValue('3')">3</button>
        <button class="number" onclick="appendValue('.')">.</button>

        <button class="number zero" onclick="appendValue('0')">0</button>

    </div>

</div>

<script>
const display = document.getElementById("display");

// Add value to display
function appendValue(value){
    display.value += value;
}

// Clear display
function clearDisplay(){
    display.value = "";
}

// Calculate result
function calculate(){
    try{
        display.value = eval(display.value);
    }
    catch{
        display.value = "Error";
    }
}

// Keyboard Support
document.addEventListener("keydown", function(event){

    const key = event.key;

    if(
        (key >= "0" && key <= "9") ||
        key === "+" ||
        key === "-" ||
        key === "*" ||
        key === "/" ||
        key === "."
    ){
        appendValue(key);
    }

    else if(key === "Enter"){
        calculate();
    }

    else if(key === "Backspace"){
        display.value = display.value.slice(0,-1);
    }

    else if(key === "Escape"){
        clearDisplay();
    }
});
</script>

</body>
</html>
