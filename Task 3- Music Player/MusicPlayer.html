<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Player</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#1e3c72,#2a5298);
}

.player{
    width:400px;
    background:#fff;
    padding:25px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.3);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

.song-info{
    text-align:center;
    margin-bottom:15px;
}

.song-title{
    font-size:24px;
    font-weight:bold;
}

.artist{
    color:gray;
    margin-top:5px;
}

/* Progress Bar */
.progress-container{
    width:100%;
    height:8px;
    background:#ddd;
    border-radius:10px;
    cursor:pointer;
    margin:15px 0;
}

.progress{
    width:0%;
    height:100%;
    background:#2a5298;
    border-radius:10px;
}

.time{
    display:flex;
    justify-content:space-between;
    font-size:14px;
}

/* Controls */
.controls{
    display:flex;
    justify-content:center;
    gap:15px;
    margin-top:20px;
}

.controls button{
    width:55px;
    height:55px;
    border:none;
    border-radius:50%;
    background:#2a5298;
    color:white;
    font-size:20px;
    cursor:pointer;
    transition:0.3s;
}

.controls button:hover{
    transform:scale(1.1);
}

/* Volume */
.volume{
    margin-top:20px;
}

.volume input{
    width:100%;
}

/* Playlist */
.playlist{
    margin-top:20px;
}

.playlist h3{
    margin-bottom:10px;
}

.playlist ul{
    list-style:none;
}

.playlist li{
    padding:10px;
    border-bottom:1px solid #ddd;
    cursor:pointer;
    transition:0.3s;
}

.playlist li:hover{
    background:#f0f0f0;
}

.active{
    background:#dbe7ff;
    font-weight:bold;
}

@media(max-width:500px){
    .player{
        width:95%;
    }
}
</style>
</head>
<body>

<div class="player">

    <h2>🎵 Punjabi Music Player</h2>

    <div class="song-info">
        <div class="song-title" id="title">Still Rollin</div>
        <div class="artist" id="artist">Shubh</div>
    </div>

    <audio id="audio"></audio>

    <div class="progress-container" id="progressContainer">
        <div class="progress" id="progress"></div>
    </div>

    <div class="time">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <div class="controls">
        <button id="prev">⏮</button>
        <button id="play">▶</button>
        <button id="next">⏭</button>
    </div>

    <div class="volume">
        <p><strong>🔊 Volume</strong></p>
        <input type="range" id="volume" min="0" max="1" step="0.1" value="1">
    </div>

    <div class="playlist">
        <h3>Playlist</h3>
        <ul id="playlist"></ul>
    </div>

</div>

<script>
const songs = [
{
title:"Still Rollin",
artist:"Shubh",
src:"music/still-rollin.mp3"
},
{
title:"Maan Meri Jaan",
artist:"King",
src:"music/maan-meri-jaan.mp3"
},
{
title:"Winning Speech",
artist:"Karan Aujla",
src:"music/winning-speech.mp3"
},
{
title:"Softly",
artist:"Karan Aujla",
src:"music/softly.mp3"
},
{
title:"Cheques",
artist:"Shubh",
src:"music/cheques.mp3"
},
{
title:"Tu Aake Dekhle",
artist:"King",
src:"music/tu-aake-dekhle.mp3"
}
];

const audio = document.getElementById("audio");
const title = document.getElementById("title");
const artist = document.getElementById("artist");
const playBtn = document.getElementById("play");
const nextBtn = document.getElementById("next");
const prevBtn = document.getElementById("prev");
const progress = document.getElementById("progress");
const progressContainer = document.getElementById("progressContainer");
const volume = document.getElementById("volume");
const playlist = document.getElementById("playlist");

let songIndex = 0;

function loadSong(index){
    title.textContent = songs[index].title;
    artist.textContent = songs[index].artist;
    audio.src = songs[index].src;

    document.querySelectorAll("#playlist li")
    .forEach(li => li.classList.remove("active"));

    if(document.querySelectorAll("#playlist li")[index]){
        document.querySelectorAll("#playlist li")[index]
        .classList.add("active");
    }
}

function playSong(){
    audio.play();
    playBtn.textContent = "⏸";
}

function pauseSong(){
    audio.pause();
    playBtn.textContent = "▶";
}

playBtn.addEventListener("click", () => {
    if(audio.paused){
        playSong();
    }else{
        pauseSong();
    }
});

nextBtn.addEventListener("click", () => {
    songIndex = (songIndex + 1) % songs.length;
    loadSong(songIndex);
    playSong();
});

prevBtn.addEventListener("click", () => {
    songIndex = (songIndex - 1 + songs.length) % songs.length;
    loadSong(songIndex);
    playSong();
});

audio.addEventListener("timeupdate", () => {

    const progressPercent =
    (audio.currentTime / audio.duration) * 100;

    progress.style.width = progressPercent + "%";

    document.getElementById("currentTime").textContent =
    formatTime(audio.currentTime);

    document.getElementById("duration").textContent =
    formatTime(audio.duration);
});

function formatTime(time){
    if(isNaN(time)) return "0:00";

    const min = Math.floor(time / 60);
    const sec = Math.floor(time % 60);

    return `${min}:${sec.toString().padStart(2,"0")}`;
}

progressContainer.addEventListener("click", e => {

    const width = progressContainer.clientWidth;
    const clickX = e.offsetX;

    audio.currentTime =
    (clickX / width) * audio.duration;
});

volume.addEventListener("input", () => {
    audio.volume = volume.value;
});

audio.addEventListener("ended", () => {
    nextBtn.click();
});

songs.forEach((song,index) => {

    const li = document.createElement("li");

    li.textContent =
    `${song.title} - ${song.artist}`;

    li.addEventListener("click", () => {
        songIndex = index;
        loadSong(songIndex);
        playSong();
    });

    playlist.appendChild(li);
});

document.addEventListener("keydown", e => {

    if(e.code === "Space"){
        e.preventDefault();

        if(audio.paused){
            playSong();
        }else{
            pauseSong();
        }
    }

    if(e.key === "ArrowRight"){
        nextBtn.click();
    }

    if(e.key === "ArrowLeft"){
        prevBtn.click();
    }
});

loadSong(songIndex);
</script>

</body>
</html>
